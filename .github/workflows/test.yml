name: Android Test

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'androidApp/**'
      - 'apps/android-test-fixture/**'
      - 'shared/**'
      - '**/*.gradle.kts'
      - 'config/detekt/**'
      - 'gradle/libs.versions.toml'
      - 'gradle/wrapper/**'
      - 'settings.gradle.kts'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        run: ./gradlew detekt :shared:jvmTest :shared:testAndroidHostTest :androidApp:assembleDebug :androidTestFixture:assembleDebug --no-daemon
