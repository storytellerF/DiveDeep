config:
  validation: true
  warningsAsErrors: false

complexity:
  LongMethod:
    active: true
    allowedLines: 90
  LongParameterList:
    active: true
    allowedFunctionParameters: 8
    allowedConstructorParameters: 8
    ignoreDefaultParameters: true
  TooManyFunctions:
    active: true
    allowedFunctionsPerFile: 20
    allowedFunctionsPerClass: 20
    allowedFunctionsPerInterface: 20
    allowedFunctionsPerObject: 20
    ignorePrivate: true

exceptions:
  TooGenericExceptionCaught:
    active: true
  SwallowedException:
    active: true

potential-bugs:
  IgnoredReturnValue:
    active: true
  ImplicitDefaultLocale:
    active: true
  MissingPackageDeclaration:
    active: true

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - Composable
  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z_][A-Za-z0-9_]*)*'
  MatchingDeclarationName:
    active: true
    excludes:
      - '**/Platform.*.kt'
      - '**/Platform.kt'

style:
  MagicNumber:
    active: true
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
  ReturnCount:
    active: true
    max: 3
    excludedFunctions:
      - equals
  ThrowsCount:
    active: true
    max: 2
